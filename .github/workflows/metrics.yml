name: Metrics
on:
  # Se ejecuta automáticamente cada 12 horas
  schedule: [{ cron: "0 */12 * * *" }]
  # Te permite ejecutarlo manualmente desde la pestaña "Actions" si quieres ver cambios ya
  workflow_dispatch:
  # Se ejecuta cada vez que haces un cambio en la rama main
  push: { branches: ["master", "main"] }
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: Necroduke
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/La_Paz

          output_action: commit
          committer_branch: main
          filename: assets/github-metrics.svg

          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_lines: yes
